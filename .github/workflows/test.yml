name: Build Waydroid Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget curl tar

      - name: Clone Waydroid repositories
        run: |
          git clone https://github.com/waydroid/waydroid.git
          git clone https://github.com/waydroid/android_vendor_waydroid.git

      - name: Create archive
        run: |
          tar -czf waydroid-offline.tar.gz waydroid android_vendor_waydroid

      - name: Create Tag
        run: |
          TAG=waydroid-$(date +'%Y%m%d')
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: waydroid-offline.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

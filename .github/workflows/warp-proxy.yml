name: WARP Proxy Server

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  warp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl wget tar git net-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WGCF
        run: |
          wget -q https://github.com/ViRb3/wgcf/releases/latest/download/wgcf_2.2.30_linux_amd64 -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/

          yes | wgcf register
          wgcf generate

      - name: Install WireProxy
        run: |
          wget -q https://github.com/pufferffish/wireproxy/releases/latest/download/wireproxy_linux_amd64.tar.gz
          tar -xzf wireproxy_linux_amd64.tar.gz
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

      - name: Create WARP config
        run: |
          mkdir warp

          PRIVATE=$(grep PrivateKey wgcf-profile.conf | awk '{print $3}')
          ADDRESS=$(grep Address wgcf-profile.conf | awk '{print $3}')
          DNS=$(grep DNS wgcf-profile.conf | awk '{print $3}')
          PUBLIC=$(grep PublicKey wgcf-profile.conf | awk '{print $3}')
          ENDPOINT=$(grep Endpoint wgcf-profile.conf | awk '{print $3}')

          cat > warp/config.ini <<EOF
          [Interface]
          PrivateKey = $PRIVATE
          Address = $ADDRESS
          DNS = $DNS

          [Peer]
          PublicKey = $PUBLIC
          Endpoint = $ENDPOINT

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

      - name: Start WARP
        run: |
          nohup wireproxy -c warp/config.ini > warp.log 2>&1 &
          sleep 8

      - name: Test WARP
        run: |
          curl --socks5 127.0.0.1:1080 https://ipinfo.io

      - name: Build Rust proxy
        run: cargo build --release

      - name: Start proxy
        run: |
          nohup ./target/release/warp-proxy > proxy.log 2>&1 &
          sleep 5

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Start tunnel
        run: |
          nohup cloudflared tunnel --url http://localhost:8080 --no-autoupdate > tunnel.txt 2>&1 &
          sleep 15
          cat tunnel.txt

      - name: Extract tunnel URL
        run: |
          URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' tunnel.txt | head -n1)
          echo $URL > tunnel_url.txt
          echo "TUNNEL_URL=$URL" >> $GITHUB_ENV

      - name: Create redirect page
        run: |
          mkdir page

          cat > page/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0;url=$TUNNEL_URL">
          <script>
          location.replace("$TUNNEL_URL")
          </script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Deploy GitHub Pages
        run: |
          cd page
          git init
          git checkout -b gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update tunnel"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages --force

      - name: Watchdog
        run: |
          for i in $(seq 1 360)
          do
            if ! pgrep cloudflared > /dev/null; then
              echo "Tunnel crashed"
              exit 1
            fi

            curl --socks5 127.0.0.1:1080 https://ipinfo.io/ip
            sleep 60
          done

      - name: Restart workflow
        if: failure()
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/warp.yml/dispatches \
          -d '{"ref":"main"}'
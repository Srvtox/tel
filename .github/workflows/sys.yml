name: Remote Shell 8.0 Distributed FS Edition

on:
  workflow_dispatch:

concurrency:
  group: remote-shell
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  distributed-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "dfs-bot"
          git config user.email "dfs@bot.local"

      - name: Init Distributed FS
        run: |
          mkdir -p dfs/env dfs/logs dfs/nodes dfs/ops
          [ -f dfs/state ] || echo 0 > dfs/state
          [ -f dfs/env/session ] || echo "# dfs env" > dfs/env/session
          echo "$(hostname)" > "dfs/nodes/$(hostname)"

      - name: Load Env
        run: |
          set -a
          source dfs/env/session 2>/dev/null || true
          set +a

      - name: Distributed FS Remote Shell
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          START=$(date +%s)

          echo "🚀 DFS Node $(hostname) started"

          while true; do
            # ======= DFS Sync Phase =======
            git fetch origin >/dev/null 2>&1
            git reset --hard origin/main >/dev/null 2>&1
            git clean -fd >/dev/null 2>&1

            # ======= Lock =======
            LOCKFILE="dfs/.lock"
            echo "$(hostname)" > "$LOCKFILE"
            git add -f "$LOCKFILE"
            git commit -m "lock $(hostname) [skip ci]" || true
            git push || true

            sleep 1 # let lock propagate

            # ======= Process Commands =======
            LAST=$(cat dfs/state)
            COUNT=0

            while IFS= read -r line || [ -n "$line" ]; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              [ "$ID" -le "$LAST" ] && continue
              [ -z "$line" ] && continue
              [[ "$line" =~ ^# ]] && continue

              echo "Node $(hostname) executing ID=$ID: $line"

              TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              # ======= Handle export VAR =======
              if [[ "$line" =~ ^export ]]; then
                VAR=$(echo "$line" | sed -E 's/export[ ]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')
                grep -v "^export $VAR=" dfs/env/session > dfs/env/tmp
                echo "$line" >> dfs/env/tmp
                mv dfs/env/tmp dfs/env/session
                source dfs/env/session
              else
                bash -c "source dfs/env/session && $line" >> dfs/logs/output.log 2>&1
                EXIT=$?
              fi

              echo "$ID" > dfs/state

              git add -f dfs/state dfs/env/session dfs/logs
              git commit -m "dfs exec $ID [skip ci]" || true
              git push || true
            done < commands.txt

            # ======= Unlock =======
            rm -f "$LOCKFILE"
            git rm -f "$LOCKFILE" || true
            git commit -m "unlock $(hostname) [skip ci]" || true
            git push || true

            # ======= Restart Logic =======
            NOW=$(date +%s)
            if [ $((NOW - START)) -gt 21000 ]; then
              curl -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/$GH_REPO/actions/workflows/remote-shell.yml/dispatches \
                -d '{"ref":"main"}'
              exit 0
            fi

            sleep 2
          done

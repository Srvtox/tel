name: Remote Shell 4.0 Ultimate Pro Max

on:
  workflow_dispatch:

concurrency:
  group: remote-shell-ultimate
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  ultimate-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare environment and files
        run: |
          mkdir -p session
          touch commands.txt sessions.log .rshell_state session/env
          if [ ! -s .rshell_state ]; then echo 0 > .rshell_state; fi
          if [ ! -s session/env ]; then echo "# Session environment vars" > session/env; fi

      - name: Load session environment
        run: |
          echo "Loading saved session environment..."
          set -a
          source session/env 2>/dev/null || true
          set +a

      - name: Start Remote Shell Engine (loop)
        shell: bash
        run: |
          echo "🚀 Remote Shell 4.0 Ultimate Pro Max Started"
          START_TIME=$(date +%s)
          set -e

          while true; do
            git fetch origin
            git reset --hard origin/main

            LAST_ID=$(cat .rshell_state)
            COUNT=0

            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              if [[ -z "$line" || "$line" =~ ^# ]]; then
                continue
              fi

              if [ "$ID" -gt "$LAST_ID" ]; then
                echo "⚡ Executing ID=$ID → $line"
                TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                # -------------------------
                #     HANDLE EXPORT
                # -------------------------
                if echo "$line" | grep -q '^export[[:space:]]'; then
                  VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')
                  grep -v "^export $VAR=" session/env > session/env.tmp || true
                  echo "$line" >> session/env.tmp
                  mv session/env.tmp session/env

                  source session/env

                  echo "$TS | ID=$ID | export updated" >> sessions.log
                  echo "$line" >> sessions.log
                  echo "----------------------------------" >> sessions.log

                  echo "$ID" > .rshell_state
                  git add sessions.log .rshell_state session/env
                  git commit -m "session update $ID [skip ci]" || true
                  git push || true
                  continue
                fi

                # -------------------------
                #     EXECUTE NORMAL CMD
                # -------------------------
                set +e
                if echo "$line" | grep -q '&[[:space:]]*$'; then
                  bash -c "source session/env && $line" >> sessions.log 2>&1 &
                  EXIT=0
                  echo "⚙️ Parallel execution started for ID=$ID"
                else
                  bash -c "source session/env && $line" >> sessions.log 2>&1
                  EXIT=$?
                fi
                set -e

                echo "$TS | ID=$ID | EXIT=$EXIT" >> sessions.log
                echo "----------------------------------" >> sessions.log

                echo "$ID" > .rshell_state
                git add sessions.log .rshell_state session/env
                git commit -m "exec $ID [skip ci]" || true
                git push || true
              fi
            done < commands.txt

            # -------------------------
            #     AUTO RESTART SYSTEM
            # -------------------------
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))

            if [ "$ELAPSED" -gt 21000 ]; then
              echo "♻️ Auto Restarting Remote Shell 4.0 Ultimate Pro Max..."
              gh workflow run remote-shell.yml
              exit 0
            fi

            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

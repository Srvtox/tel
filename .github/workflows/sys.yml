name: Remote Shell 5.0 Ultra Stable Edition

on:
  workflow_dispatch:

concurrency:
  group: remote-shell-ultimate
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  ultimate-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare persistent session folder
        run: |
          mkdir -p session
          touch commands.txt
          [ -f sessions.log ] || touch sessions.log
          [ -f .rshell_state ] || echo 0 > .rshell_state
          [ -f session/env ] || echo "# session vars" > session/env

      - name: Load session environment
        run: |
          set -a
          source session/env 2>/dev/null || true
          set +a

      - name: Start Remote Shell Engine (loop)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Remote Shell 5.0 Ultra Stable Edition Started"
          START_TIME=$(date +%s)
          set -e

          while true; do
            # sync only source repo, not session data
            git fetch origin >/dev/null 2>&1
            git reset --hard origin/main >/dev/null 2>&1
            git clean -fd >/dev/null 2>&1

            LAST_ID=$(cat .rshell_state)
            COUNT=0

            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              [ -z "$line" ] && continue
              [[ "$line" =~ ^# ]] && continue

              if [ "$ID" -gt "$LAST_ID" ]; then
                TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                echo "⚡ Running ID=$ID: $line"

                # ---------- EXPORT ----------
                if echo "$line" | grep -q '^export '; then
                  VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')
                  grep -v "^export $VAR=" session/env > session/env.tmp || true
                  echo "$line" >> session/env.tmp
                  mv session/env.tmp session/env
                  source session/env

                  {
                    echo "$TS | ID=$ID | UPDATED SESSION VAR"
                    echo "$line"
                    echo "----------------------------------"
                  } >> sessions.log

                  echo "$ID" > .rshell_state
                  git add .rshell_state session/env sessions.log
                  git commit -m "session update $ID [skip ci]" || true
                  git push || true
                  continue
                fi

                # ---------- NORMAL COMMAND ----------
                set +e
                if echo "$line" | grep -q '&$'; then
                  bash -c "source session/env && $line" >> sessions.log 2>&1 &
                  EXIT=0
                else
                  bash -c "source session/env && $line" >> sessions.log 2>&1
                  EXIT=$?
                fi
                set -e

                {
                  echo "$TS | ID=$ID | EXIT=$EXIT"
                  echo "----------------------------------"
                } >> sessions.log

                echo "$ID" > .rshell_state

                git add .rshell_state session/env sessions.log
                git commit -m "exec $ID [skip ci]" || true
                git push || true
              fi
            done < commands.txt

            # Auto-restart before 6h limit
            NOW=$(date +%s)
            if [ $((NOW - START_TIME)) -gt 21000 ]; then
              echo "♻ Restarting Remote Shell 5.0..."
              gh workflow run remote-shell.yml
              exit 0
            fi

            sleep 2
          done

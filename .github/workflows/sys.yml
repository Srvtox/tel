name: Remote Shell 9.0 FINAL BOSS EDITION

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: remote-shell
  cancel-in-progress: true

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "remote-shell"
          git config user.email "remote-shell@users.noreply.github.com"
          git config pull.rebase false

      - name: Init State
        run: |
          mkdir -p session
          touch commands.txt sessions.log .rshell_state session/env .last_reset

          # مقدارهای پیش‌فرض
          [ ! -s .rshell_state ] && echo 0 > .rshell_state
          [ ! -s session/env ] && echo "# Session Env Vars" > session/env
          [ ! -s .last_reset ] && date +%s > .last_reset

      - name: Load Session Environment
        run: |
          echo "Loading session env..."
          set -a
          source session/env || true
          set +a

      - name: Start Remote Shell Engine
        shell: bash
        run: |
          echo "🚀 Remote Shell 9.0 FINAL BOSS EDITION Started"

          set -e

          while true; do

            git fetch origin || echo "⚠️ fetch failed"

            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)
            NOW=$(date +%s)
            LAST_RESET=$(cat .last_reset)

            # Reset فقط اگر تغییر واقعی در ریموت باشد و از آخرین reset حداقل 5 ثانیه گذشته باشد
            if [ "$LOCAL" != "$REMOTE" ] && [ $((NOW - LAST_RESET)) -gt 5 ]; then
              echo "DEBUG: Safe Reset"
              echo "$NOW" > .last_reset
              git reset --hard origin/main
            else
              echo "DEBUG: No reset needed"
            fi

            LAST_ID=$(cat .rshell_state)
            COUNT=0
            NEWFOUND=0

            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              # خط خالی یا کامنت بپر
              [[ -z "$line" || "$line" =~ ^# ]] && continue

              # اگر قبلا اجرا شده رد کن
              if [ "$ID" -le "$LAST_ID" ]; then
                continue
              fi

              # دستور جدید
              NEWFOUND=1
              TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              echo -e "\n🔵 EXECUTING ID=$ID : $line" | tee -a sessions.log

              # دستور export
              if [[ "$line" =~ ^export[[:space:]] ]]; then
                VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')
                grep -v "^export $VAR=" session/env > env.tmp || true
                echo "$line" >> env.tmp
                mv env.tmp session/env

                source session/env || true

                echo "$TS | ID=$ID | export updated" | tee -a sessions.log
                echo "$ID" > .rshell_state
                git add -f session/env .rshell_state sessions.log
                git commit -m "export update $ID [skip ci]" || true
                git push || true
                continue
              fi

              # اجرای دستورات ex
              set +e
              if [[ "$line" =~ ^ex[[:space:]] ]]; then
                cmd="${line#ex }"

                echo -e "\n🖥️ Command (ex): $cmd\n--------------------------------" | tee -a sessions.log
                bash -c "source session/env && $cmd" 2>&1 | tee -a sessions.log
                EXIT=${PIPESTATUS[0]}
                echo "--------------------------------" | tee -a sessions.log

              else
                # اجرای عادی
                bash -c "source session/env && $line" 2>&1 | tee -a sessions.log
                EXIT=${PIPESTATUS[0]}
              fi
              set -e

              echo "$TS | ID=$ID | EXIT=$EXIT" | tee -a sessions.log
              echo "$ID" > .rshell_state

              # Push نتیجه
              git add -f sessions.log .rshell_state session/env
              git commit -m "exec $ID [skip ci]" || true
              git push || true

            done < commands.txt

            if [ "$NEWFOUND" -eq 0 ]; then
              echo "⏳ No new commands. Sleeping 10s..."
              sleep 10
            else
              sleep 2
            fi
          done

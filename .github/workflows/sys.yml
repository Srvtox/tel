name: Remote Shell 4.0 Ultimate Pro Max LogStream Edition

on:
  workflow_dispatch:

concurrency:
  group: remote-shell-ultimate
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  ultimate-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false

      - name: Prepare environment and files
        run: |
          mkdir -p session
          touch commands.txt sessions.log .rshell_state session/env

          if [ ! -s .rshell_state ]; then echo 0 > .rshell_state; fi
          if [ ! -s session/env ]; then echo "# Session environment vars" > session/env; fi

      - name: Load session environment
        run: |
          echo "Loading saved session environment..."
          set -a
          source session/env 2>/dev/null || true
          set +a

      - name: Start Remote Shell Engine (loop)
        shell: bash
        run: |
          echo "🚀 Remote Shell 4.0 Ultimate Pro Max LogStream Edition Started"
          START_TIME=$(date +%s)

          # اجازه می‌دیم خطاها اسکریپت رو نابود نکنن
          set -e

          while true; do
            git fetch origin || echo "⚠️ git fetch failed"
            git reset --hard origin/main || echo "⚠️ git reset failed"

            LAST_ID=$(cat .rshell_state)
            COUNT=0

            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              if [[ -z "$line" || "$line" =~ ^# ]]; then
                continue
              fi

              if [ "$ID" -gt "$LAST_ID" ]; then
                echo "⚡ Executing ID=$ID → $line"
                TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                # حذف پیشوند ex
                if [[ "$line" =~ ^ex[[:space:]]+ ]]; then
                  line="${line#ex }"
                  echo "🧹 Prefix 'ex' removed → executing: $line"
                fi

                # -------------------------
                #   HANDLE EXPORT
                # -------------------------
                if echo "$line" | grep -q '^export[[:space:]]'; then
                  VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')

                  grep -v "^export $VAR=" session/env > session/env.tmp || true
                  echo "$line" >> session/env.tmp
                  mv session/env.tmp session/env

                  source session/env || echo "⚠️ failed to source env"

                  echo "$TS | ID=$ID | export updated" >> sessions.log
                  echo "$line" >> sessions.log
                  echo "----------------------------------" >> sessions.log

                  echo "$ID" > .rshell_state

                  git add -f sessions.log .rshell_state session/env
                  git commit -m "session update $ID [skip ci]" || true
                  git push || true
                  
                  continue
                fi

                # -------------------------
                #   NORMAL COMMANDS
                # -------------------------
                set +e

                # اجرای موازی
                if echo "$line" | grep -q '&[[:space:]]*$'; then
                  echo "⚙️ Running in background..."
                  bash -c "source session/env && $line" 2>&1 | tee -a sessions.log &
                  EXIT=0

                else
                  # اجرای همزمان + نمایش در لاگ اکشن + ذخیره در sessions.log
                  bash -c "source session/env && $line" 2>&1 | tee -a sessions.log
                  EXIT=${PIPESTATUS[0]}

                fi

                set -e

                echo "$TS | ID=$ID | EXIT=$EXIT" >> sessions.log
                echo "----------------------------------" >> sessions.log

                echo "$ID" > .rshell_state

                git add -f sessions.log .rshell_state session/env
                git commit -m "exec $ID [skip ci]" || true
                git push || true
              fi
            done < commands.txt

            # Restart if runtime > 6 hours
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))

            if [ "$ELAPSED" -gt 21000 ]; then
              echo "♻ Restarting Remote Shell Automatically..."
              gh workflow run remote-shell.yml || echo "⚠️ restart failed"
              exit 0
            fi

            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

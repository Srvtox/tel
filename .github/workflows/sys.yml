name: Remote Shell ULTRAOPS v13.2 INTERACTIVE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  interactive-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils util-linux
          mkdir -p session
          touch sessions.log
          touch session/cwd session/env

          [ -f commands.txt ] || echo "" > commands.txt
          [ -f session/env ] || echo "#env" > session/env
          [ -f session/cwd ] || pwd > session/cwd

      - name: Start Interactive Loop
        shell: bash
        run: |

          echo "🤖 Remote Queue Shell INTERACTIVE v13.2 STARTED"

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          commit_push() {
            git add commands.txt sessions.log session/env session/cwd 2>/dev/null || true
            git commit -m "ops update [skip ci]" --allow-empty >/dev/null 2>&1 || true
            git pull --rebase --quiet || true
            git push --quiet || true
          }

          while true; do
            git fetch -q
            git reset --hard origin/main >/dev/null 2>&1 || true

            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            cmd=$(head -n 1 commands.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            if [[ "$cmd" == "" ]] || [[ "$cmd" == \#* ]]; then
              dequeue
              commit_push
              continue
            fi

            cwd=$(cat session/cwd)
            echo ""
            echo "🟢 EXEC: $cmd"
            echo "────────────────────────"

            # اگر دستور ssh است و پارامترهای امنیتی ندارد، اضافه کن
            if [[ "$cmd" == ssh* ]] && [[ ! "$cmd" =~ "-o StrictHostKeyChecking=no" ]] && [[ ! "$cmd" =~ "-o UserKnownHostsFile=/dev/null" ]]; then
              cmd="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${cmd#ssh }"
              echo "ℹ️ INFO: Added SSH security options."
            fi

            # --- اجرای دستور به صورت interactive با TTY ---
            # اینجا با استفاده از `script` اجرا می‌کنیم تا محیط تعاملی واقعی حفظ شود.

            # اول بررسی می‌کنیم که ابزار script موجود است، در غیر این صورت fallback به bash
            if command -v script &> /dev/null; then
              script -q -e -c "cd \"$cwd\"; source session/env 2>/dev/null; $cmd" /dev/null
            else
              # اگر script نبود، فقط اجرای عادی در حالت تداخل نداشته
              bash -c "cd \"$cwd\"; source session/env 2>/dev/null; $cmd"
            fi

            exit_code=$?

            echo "────────────────────────"
            echo "Exit code ➜ $exit_code"

            # مدیریت تغییر مسیر cd
            if [[ "$cmd" =~ ^cd[[:space:]]+(.+) ]]; then
              new_cwd=$(bash -c "cd \"$cwd\"; ${cmd}; pwd" 2>/dev/null)
              if [ -d "$new_cwd" ]; then
                echo "$new_cwd" > session/cwd
              else
                echo "⚠️ WARNING: 'cd' command failed or invalid directory."
              fi
            fi

            # حذف دستور از صف
            dequeue

            # ارسال تغییرات به گیت
            commit_push

            sleep 2
          done

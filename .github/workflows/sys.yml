name: Remote Shell 4.0 Ultimate Pro Max LogStream Edition

on:
  workflow_dispatch:

concurrency:
  group: remote-shell-ultimate
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  ultimate-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false

      - name: Prepare environment and files
        run: |
          mkdir -p session
          touch commands.txt sessions.log .rshell_state session/env

          if [ ! -s .rshell_state ]; then echo 0 > .rshell_state; fi
          if [ ! -s session/env ]; then echo "# Session environment vars" > session/env; fi

      - name: Load session environment
        run: |
          echo "Loading saved session environment..."
          set -a
          source session/env 2>/dev/null || true
          set +a

      - name: Start Remote Shell Engine (loop)
        shell: bash
        run: |
          echo "🚀 Remote Shell 4.0 Ultimate Pro Max LogStream Edition Started"

          set -e

          while true; do
            # فقط اگر remote branch فرق داشت، بازیابی کن
            git fetch origin || echo "⚠️ git fetch failed"

            LOCAL_HASH=$(git rev-parse HEAD)
            REMOTE_HASH=$(git rev-parse origin/main)

            if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
              git reset --hard origin/main
              echo "DEBUG: Reset to $REMOTE_HASH" >&2
            else
              echo "DEBUG: Repo is up-to-date" >&2
            fi

            LAST_ID=$(cat .rshell_state)
            COUNT=0
            CMD_FOUND=0

            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              # لاگ debug برای بررسی
              echo "DEBUG: ID=$ID, LAST_ID=$LAST_ID, line='$line'" >&2

              # اسکپ کردن خط خالی و کامنت
              if [[ -z "$line" || "$line" =~ ^# ]]; then
                continue
              fi

              # فقط دستورات بالاتر از LaST_ID اجرا کن
              if [ "$ID" -le "$LAST_ID" ]; then
                echo "Skipping already executed ID=$ID" >&2
                continue
              fi

              CMD_FOUND=1
              TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo -e "\n🚀 Executing ID=$ID → $line" | tee -a sessions.log

              # اگر export باشه
              if echo "$line" | grep -q '^export[[:space:]]'; then
                VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')

                grep -v "^export $VAR=" session/env > session/env.tmp || true
                echo "$line" >> session/env.tmp
                mv session/env.tmp session/env

                source session/env || echo "⚠️ failed to source env"

                echo "$TS | ID=$ID | export updated" | tee -a sessions.log

                echo "$ID" > .rshell_state

                git add -f sessions.log .rshell_state session/env
                git commit -m "session update $ID [skip ci]" || true
                git push || true

                continue
              fi

              # حذف حالت 'set -e' برای اجرای دستورات به شکل امن
              set +e

              # --- اجرای دستورات با پیشوند ex ---
              if [[ "$line" =~ ^ex[[:space:]] ]]; then
                # گرفتن دستور بدون پیشوند ex
                cmd="${line#ex }"

                echo -e "\n🖥️ Command (ex): $cmd\n----------------------------------" | tee -a sessions.log
                bash -c "source session/env && $cmd" 2>&1 | tee -a sessions.log
                EXIT=${PIPESTATUS[0]}
                echo -e "----------------------------------\n" | tee -a sessions.log

              else
                # --- اجرای دستورات عادی ---

                bash -c "source session/env && $line" 2>&1 | tee -a sessions.log
                EXIT=${PIPESTATUS[0]}
              fi

              set -e

              echo "$TS | ID=$ID | EXIT=$EXIT" | tee -a sessions.log
              echo "----------------------------------" | tee -a sessions.log

              echo "$ID" > .rshell_state

              git add -f sessions.log .rshell_state session/env
              git commit -m "exec $ID [skip ci]" || true
              git push || true
            done < commands.txt

            # اگر دستور جدید وجود ندارد، بیشتر صبر کن
            if [ "$CMD_FOUND" -eq 0 ]; then
              echo "No new commands found. Sleeping 10 seconds..." >&2
              sleep 10
            else
              sleep 2
            fi

          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Remote Shell 12.5 REAL REALTIME TERMINAL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux expect coreutils

          mkdir -p session
          : > sessions.log

          # عدم reset کردن commands.txt
          if [ ! -f commands.txt ]; then
              echo "" > commands.txt
          fi

          echo 0 > .rshell_state
          pwd > session/cwd
          echo "#env" > session/env

      - name: Start realtime terminal
        shell: bash
        run: |
          set -uo pipefail

          echo "🚀 Remote Shell 12.5 – TRUE REALTIME MODE (NO REPEAT)"

          while true; do

            # فقط pull
            git pull --rebase --no-stat -q || true

            last=$(cat .rshell_state)
            id=0

            mapfile -t lines < commands.txt || true

            for cmd in "${lines[@]}"; do

              id=$((id+1))

              if (( id <= last )); then
                continue
              fi

              cmd=$(echo "$cmd" | sed 's/^[[:space:]]*//')
              [[ -z "$cmd" ]] && continue
              [[ "$cmd" =~ ^# ]] && continue

              # سازگاری با ex
              if [[ "$cmd" =~ ^ex[[:space:]]+(.+) ]]; then
                cmd="${BASH_REMATCH[1]}"
              fi

              echo ""
              echo "🟢 EXEC $id :: $cmd"
              echo "────────────────────────"

              cwd=$(cat session/cwd)

              script -q -c "
                cd \"$cwd\"
                source session/env 2>/dev/null || true
                bash -ic '$cmd'
              " /dev/null |
              stdbuf -oL -eL tee -a sessions.log

              exit_code="${PIPESTATUS[0]}"

              echo "────────────────────────"
              echo "EXIT CODE = $exit_code"

              echo "$id" > .rshell_state

              # فقط state را push کن – commands.txt را نه!
              git add .rshell_state sessions.log session/env session/cwd 2>/dev/null || true
              git commit -m "exec $id [skip ci]" >/dev/null 2>&1 || true
              git push >/dev/null 2>&1 || true

            done

            sleep 0.3
          done

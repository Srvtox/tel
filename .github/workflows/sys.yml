name: UltraOps CI

on: [push, pull_request]

jobs:
  ultraops_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies and run script
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux git sed util-linux ca-certificates
          chmod +x ./run.sh
          ./run.sh

name: Remote Shell Pro 2.0

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'commands.txt'

concurrency:
  group: remote-shell
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  remote-shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Safe sync with origin/main
        run: |
          set -e
          git fetch origin
          git reset --hard origin/main

      - name: Ensure required files exist
        run: |
          set -e
          # حذف فایل خراب با نام "commands.txt\n" اگر وجود داشت
          if [ -f "commands.txt\n" ]; then
            rm -f "commands.txt\n"
          fi

          # اگر فایل‌ها وجود ندارند، بساز
          [ -f commands.txt ] || touch commands.txt
          [ -f sessions.log ] || touch sessions.log
          [ -f .rshell_state ] || touch .rshell_state

      - name: Run Remote Shell Engine
        env:
          STATE_FILE: .rshell_state
          LOG_FILE: sessions.log
          CMD_FILE: commands.txt
        run: |
          set -e

          echo "=== Remote Shell Pro 2.0 starting ==="

          # اگر state خالی بود، از 0 شروع کن
          if [ ! -s "$STATE_FILE" ]; then
            echo "0" > "$STATE_FILE"
          fi

          LAST_ID_PROCESSED=$(cat "$STATE_FILE" | tr -d '\r\n' || echo "0")
          echo "Last processed command id: $LAST_ID_PROCESSED"

          # فرمت مورد انتظار:
          # ex 1 ls -la
          # ex 2 uname -a
          # ex 3 echo "hello"
          #
          # آخرین ex را بگیر
          LAST_LINE=$(grep '^ex ' "$CMD_FILE" | tail -n 1 || true)

          if [ -z "$LAST_LINE" ]; then
            echo "No ex command found in $CMD_FILE. Exiting..."
            exit 0
          fi

          echo "Last ex line: $LAST_LINE"

          # جدا کردن ID و خود command
          # ex 12 ls -la
          CMD_ID=$(echo "$LAST_LINE" | awk '{print $2}')
          CMD_RAW=$(echo "$LAST_LINE" | cut -d' ' -f3-)

          if [ -z "$CMD_ID" ] || [ -z "$CMD_RAW" ]; then
            echo "Failed to parse command line: $LAST_LINE"
            exit 1
          fi

          echo "Parsed Command ID: $CMD_ID"
          echo "Parsed Command: $CMD_RAW"

          # اگر این ID جدید نیست، بی‌خیال
          if [ "$CMD_ID" -le "$LAST_ID_PROCESSED" ]; then
            echo "No new command to process (CMD_ID=$CMD_ID, LAST_ID_PROCESSED=$LAST_ID_PROCESSED). Exiting..."
            exit 0
          fi

          TS_START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$TS_START | ID=$CMD_ID | STATUS=RUNNING | CMD=$CMD_RAW" >> "$LOG_FILE"

          echo "Executing command..."
          set +e
          CMD_OUTPUT=$(bash -lc "$CMD_RAW" 2>&1)
          CMD_EXIT=$?
          set -e

          TS_END=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ $CMD_EXIT -eq 0 ]; then
            STATUS="DONE"
          else
            STATUS="ERROR"
          fi

          echo "$TS_END | ID=$CMD_ID | STATUS=$STATUS | EXIT=$CMD_EXIT" >> "$LOG_FILE"
          echo "----- OUTPUT (ID=$CMD_ID) -----" >> "$LOG_FILE"
          echo "$CMD_OUTPUT" >> "$LOG_FILE"
          echo "------------------------------" >> "$LOG_FILE"

          # آپدیت state
          echo "$CMD_ID" > "$STATE_FILE"

          echo "Command finished with status $STATUS (exit=$CMD_EXIT)"
          echo "=== Remote Shell Pro 2.0 done ==="

      - name: Commit & Push results (skip CI)
        run: |
          set -e

          git status

          # اگر هیچ تغییری نیست، خارج شو
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git add commands.txt sessions.log .rshell_state || true

          # اگر همچنان چیزی stage نشده، خارج شو
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "Realtime execution $ts [skip ci]" || true
          git push origin HEAD:main || true

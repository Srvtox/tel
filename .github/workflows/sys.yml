name: Remote Shell ULTRAOPS v13.1 STABLE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intelligent-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux coreutils

          mkdir -p session
          touch sessions.log
          touch session/cwd session/env

          [ -f commands.txt ] || echo "" > commands.txt
          [ -f session/env ] || echo "#env" > session/env
          [ -f session/cwd ] || pwd > session/cwd

      - name: Start realtime queue shell (Updated v13.1)
        shell: bash
        run: |

          set +e
          set -o pipefail

          echo "🤖 Remote Queue Shell READY (Updated v13.1)"

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          commit_push() {
            git add commands.txt sessions.log session/env session/cwd 2>/dev/null || true
            git commit -m "ops update [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase --quiet || true
            git push --quiet || true
          }

          while true; do

            # ✅ همگام‌سازی امن بدون پاک کردن session
            git fetch -q
            git pull --rebase --autostash --quiet || true

            # ✅ اگر صف خالی است
            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            # ✅ خواندن اولین دستور
            cmd=$(head -n 1 commands.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            # ✅ حذف دستورات خالی یا کامنت
            if [[ "$cmd" == "" ]] || [[ "$cmd" == \#* ]]; then
              dequeue
              commit_push
              continue
            fi

            cwd=$(cat session/cwd)

            echo ""
            echo "🟢 EXEC: $cmd"
            echo "────────────────────────"

            # ✅ اجرای واقعی با PTY صحیح
            script -q -e -c "cd \"$cwd\"; source session/env 2>/dev/null; bash -ic \"$cmd\"" /dev/null \
            | stdbuf -oL -eL tee -a sessions.log


            exit_code=${PIPESTATUS[0]}

            echo "────────────────────────"
            echo "Exit code ➜ $exit_code"

            # ✅ مدیریت cd
            if [[ "$cmd" =~ ^cd[[:space:]]+(.+) ]]; then
              new_dir="${BASH_REMATCH[1]}"
              if [ -d "$new_dir" ]; then
                cd "$new_dir"
                pwd > session/cwd
              fi
            fi

            # ✅ مدیریت export
            if [[ "$cmd" =~ ^export[[:space:]]+ ]]; then
              echo "$cmd" >> session/env
            fi

            # ✅ حذف از صف
            dequeue

            # ✅ ذخیره تغییرات
            commit_push

            sleep 1
          done

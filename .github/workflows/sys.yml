name: Remote Shell 4.0 Ultimate Pro Max

on:
  workflow_dispatch:

concurrency:
  group: remote-shell-ultimate
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  ultimate-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare environment and files
        run: |
          mkdir -p session
          touch commands.txt sessions.log .rshell_state session/env
          if [ ! -s .rshell_state ]; then echo 0 > .rshell_state; fi

      - name: Load session environment
        id: loadenv
        run: |
          if [ -f session/env ]; then
            echo "Loading session environment..."
            set -a
            source session/env
            set +a
          fi

      - name: Start Remote Shell Engine (loop)
        shell: bash
        run: |
          echo "🚀 Remote Shell 4.0 Ultimate Pro Max Started"
          START_TIME=$(date +%s)

          # Helper: update session env file with new exports found
          function update_session_env() {
            local line="$1"
            # if line is export VAR=val
            if [[ "$line" =~ ^export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=(.*)$ ]]; then
              VAR="${BASH_REMATCH[1]}"
              VAL="${BASH_REMATCH[2]}"
              # Remove old var from env file
              grep -v "^export $VAR=" session/env > session/env.tmp || true
              echo "export $VAR=$VAL" >> session/env.tmp
              mv session/env.tmp session/env
              echo "Updated session env variable: $VAR=$VAL"
            fi
          }

          while true; do
            git fetch origin
            git reset --hard origin/main

            LAST_ID=$(cat .rshell_state)
            COUNT=0

            # Read commands.txt line by line with line number (= ID)
            while IFS= read -r line; do
              COUNT=$((COUNT+1))
              ID=$COUNT

              # if this ID is not executed yet
              if [ "$ID" -gt "$LAST_ID" ]; then

                echo "⚡ Executing ID=$ID → $line"

                TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                # Handle export lines for session memory
                if [[ "$line" =~ ^export[[:space:]]+ ]]; then
                  # Update session env file and source into shell environment
                  update_session_env "$line"
                  source session/env
                  echo "$TS | ID=$ID | export updated" >> sessions.log
                  echo "$line" >> sessions.log
                  echo "----------------------------------" >> sessions.log
                  echo "$ID" > .rshell_state
                  git add sessions.log .rshell_state session/env
                  git commit -m "session update $ID [skip ci]" || true
                  git push || true
                  continue
                fi

                set +e
                # Run the command with session environment loaded
                # Check if parallel: if command ends with '&' run background
                if [[ "$line" =~ &\s*$ ]]; then
                  bash -c "source session/env && $line" >> sessions.log 2>&1 &
                  EXIT=0
                else
                  bash -c "source session/env && $line" >> sessions.log 2>&1
                  EXIT=$?
                fi
                set -e

                echo "$TS | ID=$ID | EXIT=$EXIT" >> sessions.log
                echo "----------------------------------" >> sessions.log

                echo "$ID" > .rshell_state

                git add sessions.log .rshell_state session/env
                git commit -m "exec $ID [skip ci]" || true
                git push || true

              fi
            done < commands.txt

            # Auto restart after 5h50m (21000s)
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))

            if [ "$ELAPSED" -gt 21000 ]; then
              echo "♻️ Auto Restarting Remote Shell 4.0 Ultimate Pro Max..."
              gh workflow run remote-shell-4.0.yml
              exit 0
            fi

            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

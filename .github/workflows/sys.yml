version: "3.8"

services:
  ultraops:
    image: ubuntu:22.04
    container_name: ultraops
    working_dir: /app

    volumes:
      - ./:/app

    tty: true
    stdin_open: true

    command: >
      bash -lc "
      apt-get update &&
      DEBIAN_FRONTEND=noninteractive apt-get install -y
        tmux git sed util-linux ca-certificates &&
      chmod +x /app/run.sh &&
      /app/run.sh
      "

    restart: unless-stopped

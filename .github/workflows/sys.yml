name: Remote Shell ULTRAOPS v13 STABLE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intelligent-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux coreutils

          mkdir -p session
          touch sessions.log
          touch session/cwd session/env

          [ -f commands.txt ] || echo "" > commands.txt
          [ -f session/env ] || echo "#env" > session/env
          [ -f session/cwd ] || pwd > session/cwd

      - name: Start realtime queue shell
        shell: bash
        run: |

          echo "🤖 Remote Queue Shell READY"

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          commit_push() {
            git add commands.txt sessions.log session/env session/cwd 2>/dev/null || true
            git commit -m "ops update [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase || true
            git push >/dev/null 2>&1 || true
          }

          while true; do

            git fetch -q
            git reset --hard origin/main >/dev/null 2>&1 || true

            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            cmd=$(head -n 1 commands.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            if [[ "$cmd" == "" ]] || [[ "$cmd" == \#* ]]; then
              dequeue
              commit_push
              continue
            fi

            cwd=$(cat session/cwd)

            echo ""
            echo "🟢 EXEC: $cmd"
            echo "────────────────────────"

            script -q -c "cd \"$cwd\"; source session/env 2>/dev/null; bash -ic '$cmd'" /dev/null \
            | stdbuf -oL -eL tee -a sessions.log

            exit_code=${PIPESTATUS[0]}

            echo "────────────────────────"
            echo "Exit code ➜ $exit_code"

            # update state
            [[ "$cmd" =~ ^cd[[:space:]]+(.+) ]] && echo "${BASH_REMATCH[1]}" > session/cwd
            [[ "$cmd" =~ ^export[[:space:]]+ ]] && echo "$cmd" >> session/env

            # همیشه حذف از صف
            dequeue

            # commit
            commit_push

          done

name: Remote Queue Shell

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Prepare environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y util-linux coreutils timeout

          mkdir -p session
          touch sessions.log
          [ -f commands.txt ] || touch commands.txt

      - name: Start remote queue
        shell: bash
        run: |
          echo "🤖 Remote Queue Ready"

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          push_repo() {
            git add commands.txt sessions.log 2>/dev/null || true
            git commit -m "queue update [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase origin main >/dev/null 2>&1 || true
            git push >/dev/null 2>&1 || true
          }

          normalize_cmd() {
            local raw="$1"

            # اگر دستور با ssh شروع شود، گزینه‌های non-interactive اضافه کن
            if [[ "$raw" =~ ^ssh[[:space:]]+ ]]; then
              echo "$raw -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
            else
              echo "$raw"
            fi
          }

          while true
          do
            git fetch origin main -q
            git reset --hard origin/main -q || true

            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            raw_cmd=$(head -n 1 commands.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            if [ -z "$raw_cmd" ]; then
              dequeue
              push_repo
              continue
            fi

            cmd="$(normalize_cmd "$raw_cmd")"

            echo ""
            echo "🟢 EXEC: $raw_cmd"
            echo "────────────────────"

            # هر دستور حداکثر 120 ثانیه
            timeout 120s script -q -c "bash -ic '$cmd'" /dev/null \
              | stdbuf -oL -eL tee -a sessions.log

            exit_code=${PIPESTATUS[0]}

            echo "────────────────────"
            echo "EXIT ➜ $exit_code"

            # بعد از اجرا، دستور حذف شود حتی اگر fail شود
            dequeue

            # ذخیره
            push_repo
          done

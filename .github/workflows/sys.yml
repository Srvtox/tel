name: Remote Shell 11 ULTRA REALTIME

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: remote-shell
  cancel-in-progress: true

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "remote-shell"
          git config user.email "remote-shell@users.noreply.github.com"
          git config pull.rebase false

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux expect coreutils

      - name: Init State
        shell: bash
        run: |
          set -e
          mkdir -p session
          : > commands.txt
          : > sessions.log
          : > input.txt
          : > .last_input
          : > .rshell_state
          : > .last_reset
          [ ! -s .rshell_state ] && echo 0 > .rshell_state
          [ ! -s session/env ] && echo "# Session Env Vars" > session/env
          [ ! -s session/cwd ] && pwd > session/cwd
          [ ! -s .last_reset ] && date +%s > .last_reset

      - name: Start Remote Shell Engine (Real-Time)
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s lastpipe

          echo "🚀 Remote Shell 11 ULTRA REALTIME Started"

          SESSION="rshell"

          # Start a fresh tmux session if not exists
          if ! tmux has-session -t "$SESSION" 2>/dev/null; then
            tmux new-session -d -s "$SESSION" -x 180 -y 50
          fi

          # Pipe entire pane output to tee -> sessions.log for live stream
          # -o: only set if not already set (avoid duplicates on restarts)
          tmux pipe-pane -t "$SESSION" -o "exec cat | tee -a sessions.log"

          iter=0

          while true; do
            iter=$((iter+1))

            # Lightweight auto-sync with remote every ~few seconds
            if [ $((iter % 25)) -eq 0 ]; then
              git fetch origin || true
              local_ref=$(git rev-parse HEAD)
              remote_ref=$(git rev-parse origin/$(git rev-parse --abbrev-ref HEAD))
              now=$(date +%s)
              last_reset=$(cat .last_reset || echo 0)
              if [ "$local_ref" != "$remote_ref" ] && [ $((now-last_reset)) -gt 5 ]; then
                echo "$now" > .last_reset
                git reset --hard "$remote_ref" || true
              fi
            fi

            last_id=$(cat .rshell_state)
            count=0
            newfound=0

            while IFS= read -r line || [ -n "$line" ]; do
              count=$((count+1))
              id=$count

              # skip empty or comment
              [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
              # already executed
              if [ "$id" -le "$last_id" ]; then continue; fi

              newfound=1
              ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              # Reset sessions.log per execution header to keep log focused; still appended by tee during run
              : > sessions.log
              echo "🔵 EXEC ID=$id : $line" | tee -a sessions.log

              set +e

              # Handle export lines: persist env to session/env
              if [[ "$line" =~ ^[[:space:]]*export[[:space:]]+ ]]; then
                var=$(echo "$line" | sed -E 's/^[[:space:]]*export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*).*/\1/')
                grep -v -E "^[[:space:]]*export[[:space:]]+$var=" session/env > env.tmp || true
                echo "$line" >> env.tmp
                mv env.tmp session/env
                echo "$ts export updated" | tee -a sessions.log
                exit_code=0

              # Commands prefixed with "ex " execute in tmux with realtime tee
              elif [[ "$line" =~ ^[[:space:]]*ex[[:space:]]+ ]]; then
                cmd="${line#ex }"
                echo "🖥 Command: $cmd" | tee -a sessions.log
                echo "--------------------------------" | tee -a sessions.log

                SAFE_CMD="$cmd"

                # Inline safe transforms for common package managers
                if [[ "$SAFE_CMD" =~ ^[[:space:]]*apt[[:space:]]+update ]]; then
                  SAFE_CMD="sudo apt-get update"
                elif [[ "$SAFE_CMD" =~ ^[[:space:]]*apt[[:space:]]+upgrade ]]; then
                  SAFE_CMD="sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y"
                elif [[ "$SAFE_CMD" =~ ^[[:space:]]*apt[[:space:]]+install ]]; then
                  # keep original args but force noninteractive and -y
                  SAFE_CMD="sudo DEBIAN_FRONTEND=noninteractive ${SAFE_CMD/apt /apt-get } -y"
                elif [[ "$SAFE_CMD" =~ ^[[:space:]]*pip[[:space:]]+install ]]; then
                  SAFE_CMD="pip install --break-system-packages ${SAFE_CMD#pip install }"
                elif [[ "$SAFE_CMD" =~ ^[[:space:]]*npm[[:space:]]+install ]]; then
                  SAFE_CMD="${SAFE_CMD} --yes"
                fi

                # Handle 'cd' specially (no tmux needed)
                if [[ "$SAFE_CMD" =~ ^[[:space:]]*cd[[:space:]]+ ]]; then
                  target=$(echo "$SAFE_CMD" | sed -E 's/^[[:space:]]*cd[[:space:]]+//')
                  if cd "$target" 2>/dev/null; then
                    pwd > session/cwd
                    echo "📂 Directory changed to $(cat session/cwd)" | tee -a sessions.log
                    exit_code=0
                  else
                    echo "❌ cd failed: $target" | tee -a sessions.log
                    exit_code=1
                  fi
                # Background command: run detached, still log to file
                elif [[ "$SAFE_CMD" =~ ^[[:space:]]*bg[[:space:]]+ ]]; then
                  bg_cmd="${SAFE_CMD#bg }"
                  nohup bash -lc "cd \"$(cat session/cwd)\"; source session/env 2>/dev/null; $bg_cmd" >> sessions.log 2>&1 &
                  echo "🟢 Started background process" | tee -a sessions.log
                  exit_code=0
                else
                  # THE IMPORTANT BIT: run inside tmux, pipe stdout+stderr into tee in realtime
                  # we also add unbuffer if available to reduce stdio buffering, but it's optional
                  if command -v stdbuf >/dev/null 2>&1; then
                    run_prefix="stdbuf -oL -eL"
                  else
                    run_prefix=""
                  fi

                  tmux send-keys -t "$SESSION" \
                    "cd \"$(cat session/cwd)\"; source session/env 2>/dev/null; $run_prefix bash -lc '$SAFE_CMD' 2>&1 | tee -a sessions.log" Enter

                  # Do NOT capture-pane or sleep; tee is streaming directly to sessions.log and GHA log
                  # We consider success for flow; any non-zero will be visible in log. If you want strict exit detection,
                  # you can echo a marker and parse it; for now we set to 0 to avoid loop stop.
                  exit_code=0
                fi

                echo "--------------------------------" | tee -a sessions.log

              else
                # Non-ex commands run directly in this shell with tee to show realtime
                bash -lc "cd \"$(cat session/cwd)\"; source session/env 2>/dev/null; $line" 2>&1 | tee -a sessions.log
                exit_code=${PIPESTATUS[0]}
              fi

              set -e

              echo "$ts | ID=$id | EXIT=$exit_code" | tee -a sessions.log
              echo "$id" > .rshell_state

              git add -f sessions.log .rshell_state session/env session/cwd
              git commit -m "exec $id [skip ci]" || true
              git push || true

            done < commands.txt

            # INPUT INJECTION (single-line interactive input)
            if [ -f input.txt ]; then
              cur_hash=$(md5sum input.txt | awk '{print $1}')
              old_hash=$(cat .last_input 2>/dev/null || echo "")
              if [ "$cur_hash" != "$old_hash" ]; then
                last_input=$(tail -n 1 input.txt)
                : > sessions.log
                echo "📥 Injecting input: $last_input" | tee -a sessions.log

                tmux send-keys -t "$SESSION" "$last_input" Enter

                echo "$cur_hash" > .last_input
                # No capture-pane; pane is already piped to tee -> realtime
                git add sessions.log .last_input
                git commit -m "input injected [skip ci]" || true
                git push || true
              fi
            fi

            # Small idle wait; does not affect realtime streaming of running commands
            sleep 0.2
          done

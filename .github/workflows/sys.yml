name: Remote Shell 12.7 AUTO CLEAN QUEUE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux coreutils

          mkdir -p session
          touch sessions.log

          if [ ! -f commands.txt ]; then
            echo "" > commands.txt
          fi

          pwd > session/cwd
          echo "#env" > session/env

      - name: Start realtime shell
        shell: bash
        run: |

          set -uo pipefail

          echo "🚀 Remote Shell 12.7 – AUTO CLEAN MODE"

          while true; do

            # sync repo
            git fetch -q
            git merge -s ours origin/main -q || true

            # اگر فایل خالی بود
            if [ ! -s commands.txt ]; then
              sleep 0.4
              continue
            fi

            # اولین دستور
            cmd=$(head -n 1 commands.txt)

            # حذف فاصله
            cmd=$(echo "$cmd" | sed 's/^[[:space:]]*//')

            # ignore empty
            if [[ -z "$cmd" ]] || [[ "$cmd" =~ ^# ]]; then
              tail -n +2 commands.txt > commands.tmp
              mv commands.tmp commands.txt
              continue
            fi

            # سازگاری با ex
            if [[ "$cmd" =~ ^ex[[:space:]]+(.+) ]]; then
              cmd="${BASH_REMATCH[1]}"
            fi

            echo ""
            echo "🟢 EXEC :: $cmd"
            echo "────────────────────────"

            cwd=$(cat session/cwd)

            script -q -c "
              cd \"$cwd\"
              source session/env 2>/dev/null || true
              bash -ic '$cmd'
            " /dev/null |
            stdbuf -oL -eL tee -a sessions.log

            exit_code="${PIPESTATUS[0]}"

            echo "────────────────────────"
            echo "EXIT CODE = $exit_code"

            # حذف دستور اجرا شده
            tail -n +2 commands.txt > commands.tmp
            mv commands.tmp commands.txt

            # push
            git add commands.txt sessions.log session/env session/cwd 2>/dev/null || true
            git commit -m "exec: $cmd [skip ci]" >/dev/null 2>&1 || true
            git push >/dev/null 2>&1 || true

          done

name: UltraOps v15

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ultraops
  cancel-in-progress: false

jobs:

  runner:

    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: install packages
        run: |
          sudo apt update
          sudo apt install -y tmux git sed coreutils util-linux

      - name: run ultraops
        run: |
          chmod +x run.sh
          ./run.sh

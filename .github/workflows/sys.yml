name: Remote Shell 10.1 ULTRA OPS REALTIME

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: remote-shell
  cancel-in-progress: true

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "remote-shell"
          git config user.email "remote-shell@users.noreply.github.com"
          git config pull.rebase false

      - name: Install Interactive Tools
        run: |
          sudo apt update
          sudo apt install -y tmux expect

      - name: Init State
        run: |
          mkdir -p session

          touch commands.txt
          touch sessions.log
          touch input.txt
          touch .last_input
          touch .rshell_state
          touch session/env
          touch session/cwd
          touch .last_reset

          [ ! -s .rshell_state ] && echo 0 > .rshell_state
          [ ! -s session/env ] && echo "# Session Env Vars" > session/env
          [ ! -s session/cwd ] && pwd > session/cwd
          [ ! -s .last_reset ] && date +%s > .last_reset

      - name: Start Remote Shell Engine
        shell: bash
        run: |

          echo "🚀 Remote Shell 10 ULTRA OPS (REALTIME PATCH) Started"

          set -e

          SESSION="rshell"

          if ! tmux has-session -t $SESSION 2>/dev/null; then
            tmux new-session -d -s $SESSION
          fi

          # 🔴 REALTIME STREAM: خروجی tmux زنده میره تو لاگ
          tmux pipe-pane -t $SESSION -o "cat >> sessions.log"

          ITER=0

          while true; do

            ITER=$((ITER+1))

            # 🧠 git fetch فقط هر ~۵ ثانیه
            if [ $((ITER % 25)) -eq 0 ]; then
              git fetch origin || true

              LOCAL=$(git rev-parse HEAD)
              REMOTE=$(git rev-parse origin/main)

              NOW=$(date +%s)
              LAST_RESET=$(cat .last_reset)

              if [ "$LOCAL" != "$REMOTE" ] && [ $((NOW-LAST_RESET)) -gt 5 ]; then
                echo "$NOW" > .last_reset
                git reset --hard origin/main
              fi
            fi

            LAST_ID=$(cat .rshell_state)
            COUNT=0
            NEWFOUND=0

            while IFS= read -r line; do

              COUNT=$((COUNT+1))
              ID=$COUNT

              [[ -z "$line" || "$line" =~ ^# ]] && continue
              if [ "$ID" -le "$LAST_ID" ]; then continue; fi

              NEWFOUND=1
              TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              # لاگ ریست میشه (طبق نسخه اصلی)
              > sessions.log
              echo "🔵 EXEC ID=$ID : $line" | tee -a sessions.log

              # ---------- EXPORT ENV ----------
              if [[ "$line" =~ ^export[[:space:]] ]]; then
                VAR=$(echo "$line" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*)=.*/\1/')
                grep -v "^export $VAR=" session/env > env.tmp || true
                echo "$line" >> env.tmp
                mv env.tmp session/env

                echo "$TS export updated" | tee -a sessions.log

                echo "$ID" > .rshell_state
                git add -f session/env .rshell_state sessions.log
                git commit -m "env update $ID [skip ci]" || true
                git push || true
                continue
              fi

              set +e

              if [[ "$line" =~ ^ex[[:space:]] ]]; then

                cmd="${line#ex }"
                cd "$(cat session/cwd)"

                echo "🖥 Command: $cmd" | tee -a sessions.log
                echo "--------------------------------" | tee -a sessions.log

                SAFE_CMD="$cmd"

                if [[ "$SAFE_CMD" =~ ^cd[[:space:]] ]]; then
                  TARGET="${SAFE_CMD#cd }"
                  cd "$TARGET" 2>/dev/null
                  pwd > session/cwd
                  echo "📂 Directory changed to $(cat session/cwd)" | tee -a sessions.log
                  EXIT=0
                else

                  [[ "$SAFE_CMD" =~ apt[[:space:]]+install ]] && SAFE_CMD="sudo DEBIAN_FRONTEND=noninteractive $SAFE_CMD -y"
                  [[ "$SAFE_CMD" =~ apt[[:space:]]+update ]] && SAFE_CMD="sudo $SAFE_CMD"
                  [[ "$SAFE_CMD" =~ apt[[:space:]]+upgrade ]] && SAFE_CMD="sudo DEBIAN_FRONTEND=noninteractive $SAFE_CMD -y"
                  [[ "$SAFE_CMD" =~ pip[[:space:]]+install ]] && SAFE_CMD="pip install --break-system-packages ${SAFE_CMD#pip install }"
                  [[ "$SAFE_CMD" =~ npm[[:space:]]+install ]] && SAFE_CMD="$SAFE_CMD --yes"

                  if [[ "$SAFE_CMD" =~ ^bg[[:space:]] ]]; then
                    SAFE_CMD="${SAFE_CMD#bg }"
                    nohup bash -c "$SAFE_CMD" >> sessions.log 2>&1 &
                    echo "🟢 Started background process" | tee -a sessions.log
                    EXIT=0
                  else
                    tmux send-keys -t $SESSION "cd $(cat session/cwd)" Enter
                    tmux send-keys -t $SESSION "source session/env 2>/dev/null" Enter
                    tmux send-keys -t $SESSION "$SAFE_CMD" Enter

                    # ⏱ خیلی کوتاه، چون pipe-pane زنده است
                    sleep 0.3
                    tmux capture-pane -pt $SESSION >> sessions.log
                    EXIT=0
                  fi
                fi

                echo "--------------------------------" | tee -a sessions.log

              else
                bash -lc "source session/env && $line" 2>&1 | tee sessions.log
                EXIT=${PIPESTATUS[0]}
              fi

              set -e

              echo "$TS | ID=$ID | EXIT=$EXIT" | tee -a sessions.log
              echo "$ID" > .rshell_state

              git add -f sessions.log .rshell_state session/env session/cwd
              git commit -m "exec $ID [skip ci]" || true
              git push || true

            done < commands.txt

            # ---------- INPUT INJECTION (REALTIME) ----------
            if [ -f input.txt ]; then
              CUR_HASH=$(md5sum input.txt | awk '{print $1}')
              OLD_HASH=$(cat .last_input 2>/dev/null || echo "")

              if [ "$CUR_HASH" != "$OLD_HASH" ]; then
                LAST_INPUT=$(tail -n 1 input.txt)
                > sessions.log
                echo "📥 Injecting input: $LAST_INPUT" | tee -a sessions.log
                tmux send-keys -t $SESSION "$LAST_INPUT" Enter
                echo "$CUR_HASH" > .last_input
                tmux capture-pane -pt $SESSION >> sessions.log
                git add sessions.log .last_input
                git commit -m "input injected [skip ci]" || true
                git push || true
              fi
            fi

            # ⚡ ULTRA FAST LOOP
            if [ "$NEWFOUND" -eq 0 ]; then
              sleep 0.3
            else
              sleep 0.15
            fi

          done

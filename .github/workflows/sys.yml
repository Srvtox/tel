name: UltraOps Immortal Terminal

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "commands.txt"
      - "status.md"
      - "session/**"
      - "logs/**"
  workflow_dispatch:

concurrency:
  group: ultraops-terminal
  cancel-in-progress: false

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions@users.noreply.github.com"
          git config --global user.name "UltraOps Bot"

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y tmux git

      - name: Prepare environment
        run: |
          mkdir -p session logs
          touch commands.txt
          touch session/session.log
          echo "$(pwd)" > session/cwd

      - name: Create daemon script
        run: |
          cat > run.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set +e
          set -o pipefail

          STATUS_MD="status.md"
          QUEUE_FILE="commands.txt"

          SESSION_DIR="session"
          LOG_DIR="logs"

          SESSION_LOG="$SESSION_DIR/session.log"
          SESSION_CWD_FILE="$SESSION_DIR/cwd"

          STATUS_LINES="${STATUS_LINES:-4000}"

          get_time() {
            date "+%Y-%m-%d %H:%M:%S"
          }

          log() {
            echo "[$(get_time)] $*" >> "$SESSION_LOG"
          }

          dequeue() {
            if [ "$(wc -l < "$QUEUE_FILE")" -gt 1 ]; then
              tail -n +2 "$QUEUE_FILE" > tmp.txt
              mv tmp.txt "$QUEUE_FILE"
            else
              : > "$QUEUE_FILE"
            fi
          }

          commit_push() {
            git add commands.txt status.md session logs || true
            git commit -m "UltraOps update [skip ci]" || true
            git pull --rebase || true
            git push || true
          }

          update_status() {
            {
              echo "# UltraOps Terminal"
              echo ""
              echo "Last update: $(get_time)"
              echo ""
              echo "## Current Directory"
              cat "$SESSION_CWD_FILE"
              echo ""
              echo "## Last ${STATUS_LINES} lines"
              echo ""
              echo '```'
              tail -n "$STATUS_LINES" "$SESSION_LOG"
            } > "$STATUS_MD"
          }

          tmux has-session -t remote 2>/dev/null
          if [ $? != 0 ]; then
            tmux new-session -d -s remote
          fi

          tmux pipe-pane -o -t remote "cat >> $SESSION_LOG"

          log "Daemon started"

          while true
          do
            git fetch -q
            git pull --rebase -q

            cmd=$(head -n 1 "$QUEUE_FILE")

            if [ -z "$cmd" ]; then
              sleep 2
              continue
            fi

            log "RUN: $cmd"

            if [ "$cmd" = "!CLEAR" ]; then
              : > "$QUEUE_FILE"
              log "QUEUE CLEARED"
              dequeue
              update_status
              commit_push
              continue
            fi

            if [ "$cmd" = "!KILL" ]; then
              log "TERMINATED"
              update_status
              commit_push
              exit 0
            fi

            tmux send-keys -t remote "$cmd" C-m

            if [[ "$cmd" =~ ^cd[[:space:]]+(.+) ]]; then
              new_dir="${BASH_REMATCH[1]}"
              if [ -d "$new_dir" ]; then
                cd "$new_dir"
                pwd > "$SESSION_CWD_FILE"
              fi
            fi

            dequeue
            update_status
            commit_push

            sleep 1
          done
          SCRIPT

          chmod +x run.sh

      - name: Start UltraOps daemon
        run: |
          STATUS_LINES=4000 nohup ./run.sh > daemon.log 2>&1 &
          sleep 5
          echo "UltraOps started"

      - name: Keep runner alive
        run: |
          echo "Runner alive loop started"
          while true
          do
            sleep 300
            echo "heartbeat $(date)"
          done

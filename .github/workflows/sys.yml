name: ULTRAOPS REALTIME TERMINAL PRO MAX v14

on:
  workflow_dispatch:

jobs:
  remote_shell:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup runtime folders and state
        run: |
          mkdir -p runtime
          touch runtime/cwd.txt runtime/env.sh runtime/history.log
          # اگر اولین بار است، cwd را خالی می‌گذاریم
          if [ ! -s runtime/cwd.txt ]; then
            echo "$PWD" > runtime/cwd.txt
          fi
          # اگه env هنوز نیست، خالی بساز
          if [ ! -f runtime/env.sh ]; then
            echo "export PATH=$PATH" > runtime/env.sh
          fi

      - name: Ultimate Remote Shell Loop PRO MAX 💥
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nocasematch

          while true; do
            # سینک امن و کم‌ریسک
            git pull --rebase origin main -q || true

            # اطمینان از فولدر runtime (همیشه آماده!)
            mkdir -p runtime

            # اگر دستور جدیدی نیست صبر کن
            if ! [ -s commands.txt ]; then
              sleep 2
              continue
            fi

            # گرفتن اولین دستور (بدون trim خرابکننده xargs)
            cmd=$(head -n1 commands.txt | sed 's/[[:space:]]*$//')

            # نوشتن در هیستوری (تاریخ + دستور)
            echo "$(date +"%Y-%m-%d %H:%M:%S") :: $cmd" >> runtime/history.log

            echo "===== EXECUTING :: $cmd ====="

            # بارگذاری env و cwd ذخیره شده
            source runtime/env.sh || true
            cd "$(cat runtime/cwd.txt || echo $PWD)"

            # اجرای دستور با PTY و Real-Time لاگ گرفتن
            script -q -c "bash -ic \"$cmd\"" /dev/null | stdbuf -oL -eL tee -a runtime/output.log

            # ذخیره cwd بعد از اجرا (برای حفظ وضعیت دایرکتوری)
            pwd > runtime/cwd.txt

            # ذخیره env فعلی
            export -p > runtime/env.sh

            # **دقیقا بعد از اجرا، دستور را atomic حذف کن**
            # حذف خط اول فایل commands.txt امن و خطا نداره
            sed -i '1d' commands.txt

            # commit تغییرات (history ،cwd و حذف دستور)
            git add runtime/ cwd.txt commands.txt runtime/env.sh runtime/history.log runtime/output.log || true
            git commit -m "ULTRAOPS: dequeue command and update runtime state" -q || true
            git push origin main -q || true

            # کمی استراحت بده به CPU ولی نه زیاد (Real-Time هست دیگه!)
            sleep 1
          done

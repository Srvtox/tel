name: Remote Terminal ULTRAOPS v13.9 ENTERPRISE STABLE

on:
  workflow_dispatch:
  push:
    paths:
      - 'commands.txt'

jobs:
  remote-terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup runtime directories
        run: |
          set -e
          mkdir -p runtime
          touch runtime/cwd.txt
          touch runtime/env.json
          touch runtime/history
          touch sessions.log
          # اگر cwd خالی بود، مسیر جاری رو وارد کن
          if [ ! -s runtime/cwd.txt ]; then
            pwd > runtime/cwd.txt
          fi

      - name: Run dedicated remote terminal loop
        shell: bash
        run: |
          set +e

          REPO_DIR="$(pwd)"
          RUNTIME_DIR="$REPO_DIR/runtime"
          COMMANDS_FILE="$REPO_DIR/commands.txt"
          SESSION_LOG="$REPO_DIR/sessions.log"
          CWD_FILE="$RUNTIME_DIR/cwd.txt"
          ENV_FILE="$RUNTIME_DIR/env.json"
          HISTORY_FILE="$RUNTIME_DIR/history"

          mkdir -p "$RUNTIME_DIR"
          touch "$COMMANDS_FILE" "$SESSION_LOG" "$CWD_FILE" "$ENV_FILE" "$HISTORY_FILE"

          echo "🚀 شروع ULTRAOPS Remote Terminal (Fail-Safe)"
          echo "منطقه کاری: $REPO_DIR"
          echo "فایل دستورات: $COMMANDS_FILE"
          echo "شاخه runtime: $RUNTIME_DIR"
          echo "─────────────────────────────────────────────"

          # تابع امن برای pull کردن آخرین تغییرات
          safe_pull() {
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" -q || true
          }

          # تابع امن برای commit و push
          safe_push() {
            cd "$REPO_DIR"
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git add runtime sessions.log commands.txt 2>/dev/null || true
              git commit -m "ULTRAOPS: sync runtime and queue" -q || true
              git push origin "$(git rev-parse --abbrev-ref HEAD)" -q || true
            fi
          }

          # دریافت مسیر جاری
          get_cwd() {
            if [ -s "$CWD_FILE" ] && [ -d "$(cat "$CWD_FILE")" ]; then
              cat "$CWD_FILE"
            else
              echo "$REPO_DIR"
            fi
          }

          # تنظیم مسیر جاری
          set_cwd() {
            echo "$1" > "$CWD_FILE"
          }

          # اجرای یک فرمان بوسیله PTY واقعی و timeout
          run_command() {
            local cmd="$1"
            local workdir
            workdir="$(get_cwd)"

            echo "🔹 اجرا => $cmd"
            echo "🔹 اجرا => $cmd" | tee -a "$SESSION_LOG"
            echo "────────────────────────" | tee -a "$SESSION_LOG"

            # اصلاح دستورات SSH
            if [[ "$cmd" == ssh* ]]; then
              cmd="$cmd -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
            fi

            # دستورات cd را به صورت سومی مدیریت می‌کند
            if [[ "$cmd" == cd* ]]; then
              local target="${cmd#cd }"
              target="${target:-$REPO_DIR}"
              if [ -d "$target" ]; then
                (cd "$workdir" && cd "$target" && pwd) > "$CWD_FILE"
                echo "حالت فعلی: $(cat "$CWD_FILE")" | tee -a "$SESSION_LOG"
              else
                echo "خطا: شاخه پیدا نشد - $target" | tee -a "$SESSION_LOG"
              fi
              return
            fi

            # اجرای فرمان و جمع‌آوری خروجی
            {
              cd "$workdir" && eval "$cmd" 2>&1
            } | tee -a "$SESSION_LOG"
            echo "────────────────────────" | tee -a "$SESSION_LOG"

            # حذف خط اول (دستور اجرا شده) از فایل دستورات
            sed -i '1d' "$COMMANDS_FILE"
            echo "✅ دستور اجرا شد و از صف حذف شد."
            
            # بروزرسانی وضعیت runtime
            safe_push
          }

          # حلقه اصلی
          while true; do
            safe_pull

            # اگر دستوری در صف بود، اجرا کن
            if [ -s "$COMMANDS_FILE" ]; then
              # فقط اولی رو اجرا کن
              first_command=$(head -n 1 "$COMMANDS_FILE" | sed 's/[[:space:]]*$//')
              run_command "$first_command"
            else
              echo "🌙 صف دستورات خالی؛ منتظر..."
            fi

            sleep 2
          done

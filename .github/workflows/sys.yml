name: Remote Shell ULTRAOPS v13.0 UPDATE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intelligent-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux coreutils

          mkdir -p session
          touch sessions.log
          touch session/cwd session/env

          [ -f commands.txt ] || echo "" > commands.txt
          [ -f session/env ] || echo "#env" > session/env
          [ -f session/cwd ] || pwd > session/cwd

      - name: Start realtime queue shell (Updated)
        shell: bash
        run: |

          echo "🤖 Remote Queue Shell READY (Updated v13)"

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          commit_push() {
            git add commands.txt sessions.log session/env session/cwd 2>/dev/null || true
            git commit -m "ops update [skip ci]" >/dev/null 2>&1 || true
            
            # همگام‌سازی مطمئن تر از ری‌بیس
            git pull --rebase --quiet || true
            git push --quiet || true
          }

          while true; do

            # همگام‌سازی سریع و امن در ابتدای هر حلقه
            git fetch -q
            git reset --hard origin/main >/dev/null 2>&1 || true

            # اگر صف خالی است، مکث
            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            # خواندن اولین دستور با حذف فضاهای اضافی
            cmd=$(head -n 1 commands.txt | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            # تردد بر دستورات خالی یا کامنتی
            if [[ "$cmd" == "" ]] || [[ "$cmd" == \#* ]]; then
              dequeue
              commit_push
              continue
            fi

            # خواندن مسیر جاری
            cwd=$(cat session/cwd)

            echo ""
            echo "🟢 EXEC: $cmd"
            echo "────────────────────────"

            # اجرای دستور با مدیریت مناسب
            script -q -c "cd \"$cwd\"; source session/env 2>/dev/null; bash -ic '$cmd'" /dev/null \
            | stdbuf -oL -eL tee -a sessions.log

            # گرفتن کد خروجی
            exit_code=${PIPESTATUS[0]}

            echo "────────────────────────"
            echo "Exit code ➜ $exit_code"

            # مدیریت مسیر در صورت تغییر
            if [[ "$cmd" =~ ^cd[[:space:]]+(.+) ]]; then
              echo "${BASH_REMATCH[1]}" > session/cwd
            fi

            # مدیریت متغیرهای محیطی خروجی
            if [[ "$cmd" =~ ^export[[:space:]]+ ]]; then
              echo "$cmd" >> session/env
            fi

            # حذف دستور از صف
            dequeue

            # همگام‌سازی پایانی پس از هر اجرا
            commit_push

            # بررسی تکرار فراخوانی (بازنگری در فالو)
            sleep 2
          done

name: Remote Shell 12 TRUE REALTIME

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y expect bash coreutils util-linux
          mkdir -p session
          : > commands.txt
          : > sessions.log
          : > .rshell_state
          echo 0 > .rshell_state
          echo "# env" > session/env
          pwd > session/cwd

      - name: Start TRUE REALTIME Shell
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "🔥 Remote Shell 12 TRUE REALTIME Started"

          iter=0

          while true; do
            iter=$((iter+1))

            last_id=$(cat .rshell_state)
            count=0

            # main reader
            while IFS= read -r line || [ -n "$line" ]; do
              count=$((count+1))
              id=$count

              if [[ "$id" -le "$last_id" ]]; then
                continue
              fi

              # empty / comments
              [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue

              echo "🔵 EXEC $id: $line"
              echo "----------------------------------------------"

              # reset log
              : > sessions.log

              ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              SAFE_CMD="$line"

              # ENV handling
              if [[ "$SAFE_CMD" =~ ^export[[:space:]]+ ]]; then
                var=$(echo "$SAFE_CMD" | sed -E 's/export[[:space:]]+([A-Za-z_][A-Za-z0-9_]*).*/\1/')
                grep -v "^export $var=" session/env > env.tmp || true
                echo "$SAFE_CMD" >> env.tmp
                mv env.tmp session/env
                echo "Env updated."
                exit_code=0

              # CD handling
              elif [[ "$SAFE_CMD" =~ ^cd[[:space:]]+ ]]; then
                target="${SAFE_CMD#cd }"
                if cd "$target" 2>/dev/null; then
                  pwd > session/cwd
                  echo "Directory changed to $(cat session/cwd)"
                  exit_code=0
                else
                  echo "❌ cd failed"
                  exit_code=1
                fi

              # REAL COMMANDS: EXECUTE WITH TRUE REALTIME PTY
              elif [[ "$SAFE_CMD" =~ ^ex[[:space:]]+ ]]; then
                realcmd="${SAFE_CMD#ex }"

                # safety transformer
                if [[ "$realcmd" =~ ^apt[[:space:]]+install ]]; then
                  realcmd="sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ${realcmd#apt install }"
                elif [[ "$realcmd" =~ ^apt[[:space:]]+update ]]; then
                  realcmd="sudo apt-get update"
                elif [[ "$realcmd" =~ ^apt[[:space:]]+upgrade ]]; then
                  realcmd="sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y"
                fi

                echo "▶ Running: $realcmd"

                # -------------------------
                # 🎯 **THIS IS THE MAGIC**
                # اجرای دستور داخل PTY واقعی و استریم مستقیم به اکشن
                # -------------------------
                script -q -c "cd \"$(cat session/cwd)\"; source session/env 2>/dev/null; $realcmd" /dev/null | tee -a sessions.log
                exit_code=${PIPESTATUS[0]}

              else
                # normal non-ex commands
                script -q -c "cd \"$(cat session/cwd)\"; source session/env 2>/dev/null; $SAFE_CMD" /dev/null | tee -a sessions.log
                exit_code=${PIPESTATUS[0]}
              fi

              echo "----------------------------------------------"
              echo "$ts | ID=$id | EXIT=$exit_code"
              echo "$id" > .rshell_state

              git add sessions.log .rshell_state session/env session/cwd
              git commit -m "exec $id [skip ci]" || true
              git push || true

            done < commands.txt

            sleep 0.4
          done

name: UltraOps v18 Terminal

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "commands.txt"
      - "priority.txt"
      - "session/**"
      - "logs/**"
      - "status.md"
  workflow_dispatch:

concurrency:
  group: ultraops-terminal
  cancel-in-progress: false

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git config
        run: |
          git config --global user.name "UltraOps"
          git config --global user.email "actions@github.com"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Prepare environment
        run: |

          mkdir -p session
          mkdir -p logs

          touch commands.txt
          touch priority.txt
          touch session/session.log
          touch session/cwd
          touch logs/daemon.log

      - name: Create daemon
        run: |

          cat << 'EOF' > daemon.sh
          #!/usr/bin/env bash

          QUEUE="commands.txt"
          PRIORITY="priority.txt"

          SESSION="ultraops"
          PANE="$SESSION:0.0"

          LOG="session/session.log"
          CWD_FILE="session/cwd"

          STATUS="status.md"

          now() {
            date "+%Y-%m-%d %H:%M:%S"
          }

          git_sync() {
            git add commands.txt priority.txt session status.md logs >/dev/null 2>&1
            git commit -m "UltraOps update [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase >/dev/null 2>&1 || true
            git push >/dev/null 2>&1 || true
          }

          update_status() {

            CUR=$(cat "$CWD_FILE" 2>/dev/null || pwd)

            {
              echo "# UltraOps Terminal"
              echo
              echo "Last update: $(now)"
              echo
              echo "## Current directory"
              echo "$CUR"
              echo
              echo "## Last output"
              echo '```'
              tail -n 200 "$LOG"
              echo '```'
            } > "$STATUS"

          }

          ensure_tmux() {

            if ! tmux has-session -t "$SESSION" 2>/dev/null; then

              START=$(pwd)

              tmux new-session -d -s "$SESSION" -c "$START" bash

              tmux pipe-pane -o -t "$PANE" "cat >> $LOG"

              echo "$START" > "$CWD_FILE"

            fi

          }

          get_command() {

            if [ -s "$PRIORITY" ]; then
              head -n1 "$PRIORITY"
              tail -n +2 "$PRIORITY" > "$PRIORITY.tmp"
              mv "$PRIORITY.tmp" "$PRIORITY"
              return
            fi

            if [ -s "$QUEUE" ]; then
              head -n1 "$QUEUE"
              tail -n +2 "$QUEUE" > "$QUEUE.tmp"
              mv "$QUEUE.tmp" "$QUEUE"
              return
            fi

          }

          run_command() {

            CMD="$1"

            echo "" >> "$LOG"
            echo "[$(now)] RUN: $CMD" >> "$LOG"

            case "$CMD" in

              "!CLEAR")

                > "$LOG"
                echo "log cleared" >> "$LOG"

              ;;

              "!STATUS")

                echo "[$(now)] STATUS OK" >> "$LOG"

              ;;

              "!KILL")

                echo "[$(now)] TERMINATED" >> "$LOG"
                tmux kill-session -t "$SESSION"
                exit 0

              ;;

              "!RESTART")

                echo "[$(now)] RESTARTING" >> "$LOG"
                exec "$0"

              ;;

              *)

                tmux send-keys -t "$PANE" "$CMD" C-m

                if [[ "$CMD" == cd* ]]; then

                  sleep 1

                  tmux send-keys -t "$PANE" "pwd > .cwd_marker" C-m
                  sleep 1

                  DIR=$(tmux capture-pane -p -S -20 -t "$PANE" | tail -n1)

                  if [ -d "$DIR" ]; then
                    echo "$DIR" > "$CWD_FILE"
                  fi

                fi

              ;;

            esac

          }

          ensure_tmux

          echo "[$(now)] Daemon started" >> "$LOG"

          update_status
          git_sync

          while true
          do

            git pull --rebase >/dev/null 2>&1 || true

            CMD=$(get_command)

            if [ ! -z "$CMD" ]; then

              run_command "$CMD"

              update_status
              git_sync

            fi

            sleep 2

          done
          EOF

          chmod +x daemon.sh

      - name: Start daemon
        run: |
          nohup ./daemon.sh > logs/out.log 2>&1 &

      - name: Keep alive
        run: |
          while true
          do
            echo "alive $(date)"
            sleep 300
          done

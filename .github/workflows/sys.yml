name: Remote Shell Engine PRO MAX

on:
  workflow_dispatch:
  push:
    paths:
      - commands.txt

permissions:
  contents: write

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tmux screen expect util-linux coreutils jq openssh-client

          mkdir -p runtime
          touch runtime/env.json
          touch runtime/cwd.txt
          touch runtime/history
          touch sessions.log

          echo "$HOME" > runtime/cwd.txt

          [ -f commands.txt ] || touch commands.txt

      - name: Start PRO MAX Shell Engine
        shell: bash
        run: |
          set +e

          LOG="sessions.log"
          STATE_ENV="runtime/env.json"
          STATE_CWD="runtime/cwd.txt"
          HISTORY="runtime/history"

          save_state() {
            local exit=$1
            jq -n \
              --arg cwd "$(cat $STATE_CWD)" \
              --argjson exit $exit \
              '{cwd: $cwd, exit: $exit}' > runtime/last_state.json
          }

          dequeue() {
            tail -n +2 commands.txt > .tmp && mv .tmp commands.txt
          }

          git_sync() {
            git add . >/dev/null 2>&1 || true
            git commit -m "update [skip ci]" >/dev/null 2>&1 || true
            git pull --rebase origin main >/dev/null 2>&1 || true
            git push >/dev/null 2>&1 || true
          }

          normalize_cmd() {
            local c="$1"

            if [[ "$c" =~ ^cd[[:space:]]+ ]]; then
              echo "__CD__ ${c#cd }"
              return
            fi

            if [[ "$c" =~ ^export[[:space:]]+ ]]; then
              echo "__EXPORT__ ${c#export }"
              return
            fi

            if [[ "$c" =~ ^ssh[[:space:]]+ ]]; then
              echo "$c -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=15 -o ServerAliveCountMax=3"
              return
            fi

            echo "$c"
          }

          while true; do
            git fetch origin main -q
            git reset --hard origin/main -q || true

            if [ ! -s commands.txt ]; then
              sleep 1
              continue
            fi

            raw=$(head -n 1 commands.txt | xargs)
            cmd=$(normalize_cmd "$raw")

            echo "" | tee -a "$LOG"
            echo "🔹 EXEC => $raw" | tee -a "$LOG"
            echo "────────────────────────" | tee -a "$LOG"

            if [[ "$cmd" == __CD__* ]]; then
              newdir="${cmd#__CD__ }"
              if cd "$newdir" 2>/dev/null; then
                pwd > "$STATE_CWD"
                echo "Changed directory to $(pwd)" | tee -a "$LOG"
                save_state 0
              else
                echo "cd: no such directory" | tee -a "$LOG"
                save_state 1
              fi
              dequeue
              git_sync
              continue
            fi

            if [[ "$cmd" == __EXPORT__* ]]; then
              eval "export ${cmd#__EXPORT__ }"
              echo "$cmd" >> "$STATE_ENV"
              echo "env updated" | tee -a "$LOG"
              save_state 0
              dequeue
              git_sync
              continue
            fi

            timeout 200s script -q -c "bash -ic '$cmd'" /dev/null \
              | stdbuf -oL -eL tee -a "$LOG"

            exit_code=${PIPESTATUS[0]}
            save_state "$exit_code"

            echo "────────────────────────" | tee -a "$LOG"
            echo "EXIT CODE: $exit_code" | tee -a "$LOG"

            dequeue
            git_sync

          done

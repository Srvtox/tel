name: Remote Shell 12.3 TRUE REALTIME TERMINAL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system
        run: |
          sudo apt-get update
          sudo apt-get install -y util-linux expect coreutils

          mkdir -p session
          : > sessions.log
          : > commands.txt

          echo 0 > .rshell_state
          pwd > session/cwd
          echo "#env" > session/env

      - name: Start realtime terminal
        shell: bash
        run: |

          set -uo pipefail   # بدون -e → با خطا متوقف نشود

          echo "🚀 Remote Shell 12.3 TERMINAL MODE"

          while true
          do

            # همیشه آخرین commands.txt را بگیر
            git fetch --all
            git reset --hard origin/main

            last=$(cat .rshell_state)
            id=0

            mapfile -t lines < commands.txt || true

            for cmd in "${lines[@]}"
            do

              id=$((id+1))

              if (( id <= last ))
              then
                continue
              fi

              cmd=$(echo "$cmd" | sed 's/^[[:space:]]*//')
              [[ -z "$cmd" ]] && continue
              [[ "$cmd" =~ ^# ]] && continue

              echo ""
              echo "🟢 EXEC $id :: $cmd"
              echo "────────────────────────"

              cwd=$(cat session/cwd)

              # اجرای دستور داخل PTY واقعی
              script -q -c "
                cd \"$cwd\"
                source session/env 2>/dev/null
                bash -ic '$cmd'
              " /dev/null \
              | stdbuf -oL -eL tee -a sessions.log

              exit_code=${PIPESTATUS[0]}

              echo "────────────────────────"
              echo "EXIT CODE = $exit_code"

              echo "$id" > .rshell_state

              git add sessions.log .rshell_state session/env session/cwd
              git commit -m "exec $id [skip ci]" || true
              git push || true

            done

            sleep 0.4

          done
